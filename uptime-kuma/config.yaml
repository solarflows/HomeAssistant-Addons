name: Uptime Kuma
slug: uptime-kuma
version: "2.4.0-build.15"
image: ghcr.io/solarflows/uptime-kuma
description: "A fancy self-hosted monitoring tool"
url: https://github.com/louislam/uptime-kuma
init: false
arch:
  - aarch64
  - amd64
webui: "[PROTO:http]://[HOST]:[PORT:3001]"
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: 'Uptime Kuma Web UI port'
map:
  - config:rw
  - share:rw
startup: application
boot: manual
ingress: true
ingress_port: 3001
