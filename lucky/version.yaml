# lucky 版本检查配置
addon: lucky
source: github
repo: gdy666/lucky
tag_prefix: "v" # 上游 tag: v2.27.2 → 2.27.2
build_args:
  LUCKY_VERSION: "${version}"
changelog:
  source: release_body # 上游 release note 既是 changelog
  mode: prepend # 添加到开头
tracking:
  upstream_version: "2.27.2" # 上游清洁版本号（无 -build.N 后缀，用于 build_args）
  base_tag: "v9.3.0" # 上次构建使用的 debian-base 版本
  file_sha: "af79b2cfc323fc86495409055ea0ad0d722b0abe" # 上次文件检查时的 git SHA
  build_num: 1 # build 计数（version_changed 时重置为 0）
