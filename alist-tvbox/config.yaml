name: AList-TvBox
slug: alist-tvbox
version: "1.26.0-build.3"
image: ghcr.io/solarflows/alist-tvbox
description: "AList proxy server for TvBox, support playlist and search."
url: https://github.com/power721/alist-tvbox
init: false
arch:
  - aarch64
  - amd64
icon: mdi:television-box
webui: "[PROTO:http]://[HOST]:[PORT:4567]"
ports:
  4567/tcp: 4567
  80/tcp: 5344
ports_description:
  4567/tcp: "Manager Web UI port"
  80/tcp: "Alist Web UI port"
environment:
  no_proxy: "*.aliyundrive.com"
  ALIST_PORT: "5344"
  INSTALL: "xiaoya"
  MEM_OPT: "-Xmx512M"
map:
  - config:rw
startup: application
boot: manual
ingress: true
ingress_port: 4567
