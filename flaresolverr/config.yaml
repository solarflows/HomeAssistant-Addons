---
name: FlareSolverr for HA
slug: flaresolverr
version: "3.5.0-build.5"
image: ghcr.io/solarflows/flaresolverr
description: "Bypass Cloudflare anti-bot page, support for Home Assistant."
url: https://github.com/FlareSolverr/FlareSolverr
init: false
arch:
  - aarch64
  - amd64
ports:
  8191/tcp: 8191
  8192/tcp: 8192
ports_description:
  8191/tcp: "FlareSolverr proxy port"
  8192/tcp: "Prometheus exporter port"
environment:
  LOG_LEVEL: "info"
  LOG_FILE: ""
  HEADLESS: "true"
  DISABLE_MEDIA: "false"
  LANG: ""
  PROMETHEUS_ENABLED: "false"
  PROXY_URL: ""
  PROXY_USERNAME: ""
  PROXY_PASSWORD: ""
# 可选配置项：修改后保存并重启 addon 生效。
options:
  LOG_LEVEL: info
  LOG_FILE: ""
  HEADLESS: true
  DISABLE_MEDIA: false
  LANG: ""
  PROMETHEUS_ENABLED: false
  PROXY_URL: ""
  PROXY_USERNAME: ""
  PROXY_PASSWORD: ""
schema:
  LOG_LEVEL: list(info|debug|warn|error)
  LOG_FILE: str?
  HEADLESS: bool
  DISABLE_MEDIA: bool
  LANG: str?
  PROMETHEUS_ENABLED: bool
  PROXY_URL: url?
  PROXY_USERNAME: str?
  PROXY_PASSWORD: password?
cap_add:
  - SYS_ADMIN
  - IPC_LOCK
tmpfs: true
map:
  - config:rw
startup: application
boot: manual
