name: AList-TvBox Standalone
slug: alist-tvbox-standalone
version: "1.26.0-build.12"
image: ghcr.io/solarflows/alist-tvbox-standalone
description: "AList-TvBox without embedded AList kernel, connect to external AList instance."
url: https://github.com/power721/alist-tvbox
init: false
arch:
  - aarch64
  - amd64
icon: mdi:television-box
webui: "[PROTO:http]://[HOST]:[PORT:4567]"
ports:
  4567/tcp: 4567
  5244/tcp: 5244
ports_description:
  4567/tcp: 'Manager Web UI port'
  5244/tcp: 'Alist port'
environment:
  no_proxy: "*.aliyundrive.com"
  ALIST_PORT: "5244"
  INSTALL: "new"
  MEM_OPT: "-Xmx512M"
map:
  - config:rw
startup: application
boot: manual
ingress: true
ingress_port: 4567
