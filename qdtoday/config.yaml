name: qdtoday
slug: qdtoday
version: "20250803-build.7"
image: ghcr.io/solarflows/qdtoday
description: "QD - HTTP请求定时任务自动执行框架 base on HAR Editor and Tornado Server"
url: https://github.com/qd-today/qd
init: false
arch:
  - aarch64
  - amd64
webui: "[PROTO:http]://[HOST]:[PORT:8923]"
ports:
  8923/tcp: 8923
ports_description:
  8923/tcp: "QD Web UI port"
# 可选配置项：修改后保存即可生效，无需重启整个 addon。
# 常用配置在 UI 中可见；高级配置可手动写入 YAML（见下方 schema）。
options:
  QD_DEBUG: false
  AES_KEY: ""
  COOKIE_SECRET: ""
  DOMAIN: ""
  MAIL_SMTP: ""
  MAIL_PORT: 465
  MAIL_USER: ""
  MAIL_PASSWORD: ""
schema:
  QD_DEBUG: bool?
  AES_KEY: str?
  COOKIE_SECRET: str?
  DOMAIN: str?
  MAIL_SMTP: str?
  MAIL_PORT: int?
  MAIL_USER: str?
  MAIL_PASSWORD: password?
  # 高级配置（UI 中隐藏，手动写入 YAML 生效）
  USE_PYCURL: bool?
  DNS_SERVER: str?
  TRACEBACK_PRINT: bool?
  PUSH_BATCH_SW: bool?
  PROXIES: str?
  MAIL_SSL: bool?
  TASK_REQUEST_LIMIT: int?
  TASK_WHILE_LOOP_TIMEOUT: int?
  NEW_TASK_DELAY: int?
map:
  - config:rw
  - ssl:ro
startup: application
boot: manual
ingress: true
ingress_port: 8923
