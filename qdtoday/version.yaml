# qdtoday 版本检查配置
addon: qdtoday
source: github
repo: qd-today/qd
tag_prefix: ""           # tag: 20250803
build_args:
  QD_VERSION: "${tag}"
changelog:
  source: file           # 从上游获取完整 changelog
  file_url: "https://github.com/qd-today/qd/raw/refs/heads/master/CHANGELOG.md"
  mode: prepend          # 添加到开头
