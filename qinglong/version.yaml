# qinglong 版本检查配置
# 注意：qinglong 没有 GitHub Release，只有 tags
addon: qinglong
source: github_tags # 使用 tags API 而非 releases API
repo: whyour/qinglong
tag_prefix: "v"
build_args:
  QINGLONG_VERSION: "${version}"
changelog:
  source: tag_file # 从指定 tag 下的文件获取
  file_path: "CHANGELOG.md" # tag 下的 version.yaml 即当前版本 changelog
  mode: replace # 整个替换 CHANGELOG.md
tracking:
  upstream_version: "2.21.0" # 上游清洁版本号（无 -build.N 后缀，用于 build_args）
  base_tag: "v9.3.0" # 上次构建使用的 debian-base 版本
  file_sha: "b8afc71fc0c8836a7c8c0ac8a20af7fe162769d1" # 上次文件检查时的 git SHA
  build_num: 1 # build 计数（version_changed 时重置为 0）
