name: Release Addon Images

on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON matrix of addons to build'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild all addons'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(inputs.matrix || '{"include":[]}') }}
      fail-fast: false
      max-parallel: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        id: prep
        run: |
          ADDON="${{ matrix.addon }}"
          ADDON_DIR="$ADDON"
          VERSION="${{ matrix.version }}"
          BUILD_VERSION="${{ matrix.build_version }}"
          REASON="${{ matrix.reason || 'version_changed' }}"
          BASE_TAG="${{ matrix.base_tag }}"
          BUILD_NUM="${{ matrix.build_num }}"
          VERSION_FILE="${ADDON_DIR}/version.yaml"
          CONFIG_FILE="${ADDON_DIR}/config.yaml"

          # 从 filesystem 推导参数
          IMAGE=$(yq eval '.image // ""' "$CONFIG_FILE")
          [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ] && IMAGE="ghcr.io/${{ github.repository_owner }}/${ADDON}"

          DOCKERFILE="${ADDON_DIR}/Dockerfile"

          ARCHS=$(yq eval '.arch | join(",")' "$CONFIG_FILE")
          [ -z "$ARCHS" ] || [ "$ARCHS" = "null" ] && ARCHS="aarch64,amd64"
          PLATFORMS=$(echo "$ARCHS" | sed 's/aarch64/arm64/g; s/amd64/amd64/g; s/armhf/arm\/v7/g; s/armv7/arm\/v7/g; s/i386/386/g' | sed 's/\([^,]*\)/linux\/\1/g')

          # TAG 用于 GitHub API (changelog 获取)，大多数上游 tag 带 v 前缀
          TAG="v${VERSION}"

          REPO=$(yq eval '.repo' "$VERSION_FILE")

          CHANGELOG_SOURCE=$(yq eval '.changelog.source // "release_body"' "$VERSION_FILE")
          CHANGELOG_MODE=$(yq eval '.changelog.mode // "prepend"' "$VERSION_FILE")
          CHANGELOG_FILE_URL=$(yq eval '.changelog.file_url // ""' "$VERSION_FILE")
          CHANGELOG_FILE_PATH=$(yq eval '.changelog.file_path // ""' "$VERSION_FILE")

          # file_changed 时取最近的 commit message
          if [ "$REASON" = "file_changed" ]; then
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          else
            COMMIT_MSG=""
          fi

          echo "addon=$ADDON" >> $GITHUB_OUTPUT
          echo "addon_dir=$ADDON_DIR" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "changelog_source=$CHANGELOG_SOURCE" >> $GITHUB_OUTPUT
          echo "changelog_mode=$CHANGELOG_MODE" >> $GITHUB_OUTPUT
          echo "changelog_file_url=$CHANGELOG_FILE_URL" >> $GITHUB_OUTPUT
          echo "changelog_file_path=$CHANGELOG_FILE_PATH" >> $GITHUB_OUTPUT
          echo "base_tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Prepare build args
        id: buildargs
        run: |
          ADDON_DIR="${{ steps.prep.outputs.addon_dir }}"
          VERSION="${{ steps.prep.outputs.version }}"
          TAG="${{ steps.prep.outputs.tag }}"
          VERSION_FILE="${ADDON_DIR}/version.yaml"

          # 从 version.yaml 的 build_args 字段动态生成构建参数
          BUILD_ARGS=""
          if [ -f "$VERSION_FILE" ]; then
            BUILD_ARGS=$(yq eval '.build_args // {}' -o=json "$VERSION_FILE" | jq -r \
              --arg v "$VERSION" --arg t "$TAG" \
              'to_entries[] | "\(.key)=\(.value | gsub("\\$\\{version\\}"; $v) | gsub("\\$\\{tag\\}"; $t))"')
          fi

          {
            echo "build_args<<BUILDARGS_EOF"
            echo "$BUILD_ARGS"
            echo "BUILDARGS_EOF"
          } >> $GITHUB_OUTPUT
          echo "Build args: $BUILD_ARGS"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.prep.outputs.addon_dir }}
          file: ${{ steps.prep.outputs.dockerfile }}
          platforms: ${{ steps.prep.outputs.platforms }}
          push: true
          build-args: ${{ steps.buildargs.outputs.build_args }}
          tags: |
            ${{ steps.prep.outputs.image }}:latest
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.build_version }}
          cache-from: type=gha,scope=${{ matrix.addon }}
          cache-to: type=gha,mode=max,scope=${{ matrix.addon }}

      - name: Prepare config updates & commit
        if: success()
        id: config
        run: |
          ADDON_DIR="${{ steps.prep.outputs.addon_dir }}"
          ADDON="${{ steps.prep.outputs.addon }}"
          VERSION="${{ steps.prep.outputs.version }}"
          BUILD_VERSION="${{ steps.prep.outputs.build_version }}"
          TAG="${{ steps.prep.outputs.tag }}"
          REPO="${{ steps.prep.outputs.repo }}"
          REASON="${{ steps.prep.outputs.reason }}"
          CHANGELOG_SOURCE="${{ steps.prep.outputs.changelog_source }}"
          CHANGELOG_MODE="${{ steps.prep.outputs.changelog_mode }}"
          CHANGELOG_FILE_URL="${{ steps.prep.outputs.changelog_file_url }}"
          CHANGELOG_FILE_PATH="${{ steps.prep.outputs.changelog_file_path }}"
          COMMIT_MSG="${{ steps.prep.outputs.commit_msg }}"
          BASE_TAG="${{ steps.prep.outputs.base_tag }}"
          BUILD_NUM="${{ steps.prep.outputs.build_num }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d")

          # 更新 config.yaml 版本号（使用 build_version，含 -build.N 后缀保证 HAOS 识别更新）
          if [ "$REASON" = "version_changed" ] || [ "$REASON" = "base_updated" ] || [ "$REASON" = "file_changed" ] || [ "$REASON" = "force_rebuild" ]; then
            yq eval ".version = \"${BUILD_VERSION}\"" -i "${ADDON_DIR}/config.yaml"
            echo "Updated ${ADDON_DIR}/config.yaml to version ${BUILD_VERSION}"
          fi

          # 更新 CHANGELOG.md
          if [ "$REASON" = "file_changed" ]; then
            # 文件变更：使用 commit message 作为 changelog
            CHANGELOG_CONTENT="${COMMIT_MSG:-chore: update workflow/Dockerfile}"
            if [ -f "${ADDON_DIR}/CHANGELOG.md" ]; then
              # prepend: 添加到开头
              printf "### %s - %s\n\n%s" "$TIMESTAMP" "$CHANGELOG_CONTENT" "$(cat "${ADDON_DIR}/CHANGELOG.md")" > temp_changelog.md
              mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
            else
              printf "### %s - %s\n\n" "$TIMESTAMP" "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
            fi
            echo "Updated ${ADDON_DIR}/CHANGELOG.md with file change record"
          elif [ "$REASON" = "base_updated" ]; then
            # 底包更新：记录 debian-base tag
            CHANGELOG_CONTENT="底包更新至 ${BASE_TAG}，无功能变更"
            if [ -f "${ADDON_DIR}/CHANGELOG.md" ]; then
              printf "### %s - %s\n\n%s" "$TIMESTAMP" "$CHANGELOG_CONTENT" "$(cat "${ADDON_DIR}/CHANGELOG.md")" > temp_changelog.md
              mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
            else
              printf "### %s - %s\n\n" "$TIMESTAMP" "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
            fi
            echo "Updated ${ADDON_DIR}/CHANGELOG.md with base image update record"
          elif [ "$REASON" = "force_rebuild" ]; then
            CHANGELOG_CONTENT="手动触发强制重建"
            if [ -f "${ADDON_DIR}/CHANGELOG.md" ]; then
              printf "### %s - %s\n\n%s" "$TIMESTAMP" "$CHANGELOG_CONTENT" "$(cat "${ADDON_DIR}/CHANGELOG.md")" > temp_changelog.md
              mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
            else
              printf "### %s - %s\n\n" "$TIMESTAMP" "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
            fi
          elif [ "$REASON" = "version_changed" ]; then
            if [ "$CHANGELOG_SOURCE" = "tag_file" ] && [ -n "$CHANGELOG_FILE_PATH" ]; then
              # 从指定 tag 下的文件获取 changelog（使用 GitHub Contents API）
              CHANGELOG_CONTENT=$(curl -fsSL \
                -H "Accept: application/vnd.github.raw+json" \
                "https://api.github.com/repos/${REPO}/contents/${CHANGELOG_FILE_PATH}?ref=${TAG}" 2>/dev/null || \
                curl -fsSL \
                -H "Accept: application/vnd.github.raw+json" \
                "https://api.github.com/repos/${REPO}/contents/${CHANGELOG_FILE_PATH}?ref=${VERSION}" || echo "")
              if [ -n "$CHANGELOG_CONTENT" ]; then
                if [ "$CHANGELOG_MODE" = "replace" ]; then
                  echo "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
                else
                  printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$CHANGELOG_CONTENT" > temp_changelog.md
                  cat temp_changelog.md "${ADDON_DIR}/CHANGELOG.md" > combined.md 2>/dev/null || mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
                  mv combined.md "${ADDON_DIR}/CHANGELOG.md" 2>/dev/null
                  rm -f temp_changelog.md combined.md
                fi
              fi
            elif [ "$CHANGELOG_SOURCE" = "file" ] && [ -n "$CHANGELOG_FILE_URL" ]; then
              FILE_CONTENT=$(curl -fsSL "$CHANGELOG_FILE_URL" || echo "")
              if [ -n "$FILE_CONTENT" ]; then
                if [ "$CHANGELOG_MODE" = "replace" ]; then
                  echo "$FILE_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
                else
                  printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$FILE_CONTENT" > temp_changelog.md
                  cat temp_changelog.md "${ADDON_DIR}/CHANGELOG.md" > combined.md 2>/dev/null || mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
                  mv combined.md "${ADDON_DIR}/CHANGELOG.md" 2>/dev/null
                  rm -f temp_changelog.md combined.md
                fi
              fi
            else
              # 默认: release_body - 从 GitHub release body 获取
              RELEASE_BODY=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" \
                | jq -r '.body // empty')
              # fallback: some repos don't use v prefix (e.g. uptime-kuma)
              [ -z "$RELEASE_BODY" ] && RELEASE_BODY=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/tags/${VERSION}" \
                | jq -r '.body // empty')
              [ -z "$RELEASE_BODY" ] && RELEASE_BODY="No changelog available."

              if [ "$CHANGELOG_MODE" = "replace" ]; then
                printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$RELEASE_BODY" > "${ADDON_DIR}/CHANGELOG.md"
              else
                # prepend: 新条目添加到开头
                printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$RELEASE_BODY" > temp_changelog.md
                cat temp_changelog.md "${ADDON_DIR}/CHANGELOG.md" > combined.md 2>/dev/null || mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
                mv combined.md "${ADDON_DIR}/CHANGELOG.md" 2>/dev/null
                rm -f temp_changelog.md combined.md
              fi
            fi
          fi

          # 更新 version.yaml 中的 tracking 字段
          VERSION_FILE="${ADDON_DIR}/version.yaml"
          CURRENT_SHA=$(git rev-parse HEAD)
          yq eval ".tracking.file_sha = \"${CURRENT_SHA}\"" -i "$VERSION_FILE"
          yq eval ".tracking.build_num = ${BUILD_NUM}" -i "$VERSION_FILE"
          # version_changed 时更新版本号（清洁版本号，用于下次比较基准）
          if [ "$REASON" = "version_changed" ]; then
            yq eval ".version = \"${VERSION}\"" -i "$VERSION_FILE"
          fi
          # 仅 debian-base 系 addon 更新 base_tag
          ADDON_BASE_TAG=$(yq eval '.tracking.base_tag // "null"' "$VERSION_FILE")
          if [ "$ADDON_BASE_TAG" != "null" ] && [ "$ADDON_BASE_TAG" != "" ]; then
            yq eval ".tracking.base_tag = \"${BASE_TAG}\"" -i "$VERSION_FILE"
          fi
          echo "Updated tracking in $VERSION_FILE"

          # 独立提交：每个 addon 构建成功后立即 commit+push 自己的更新
          if git diff --quiet; then
            echo "No changes for ${ADDON}, skip commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${ADDON_DIR}/"
            if [ "$REASON" = "file_changed" ]; then
              git commit -m "chore(${ADDON}): ${COMMIT_MSG:-update workflow/Dockerfile}"
            elif [ "$REASON" = "base_updated" ]; then
              git commit -m "chore(${ADDON}): 底包更新至 ${BASE_TAG}，rebuild ${BUILD_VERSION}"
            elif [ "$REASON" = "force_rebuild" ]; then
              git commit -m "chore(${ADDON}): 手动强制重建 ${BUILD_VERSION}"
            else
              git commit -m "chore(${ADDON}): update to ${BUILD_VERSION}"
            fi
            # 重试 push，处理并行构建的竞态
            PUSH_OK=false
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && { PUSH_OK=true; break; }
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
            if [ "$PUSH_OK" = "false" ]; then
              echo "ERROR: Push failed after 3 attempts for ${ADDON}"
              exit 1
            fi
            echo "Committed ${ADDON} ${VERSION}"
          fi

  cache-summary:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Show GitHub Actions cache summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '### GitHub Actions Cache Summary'
          echo ''
          TOTAL_SIZE=0
          while IFS=$'\t' read -r key size created; do
            SIZE_MB=$(echo "scale=2; $size / 1048576" | bc)
            TOTAL_SIZE=$((TOTAL_SIZE + size))
            printf '| %-30s | %8s MB | %-20s |\n' "$key" "$SIZE_MB" "$created"
          done < <(gh cache list --repo "${{ github.repository }}" \
            --sort created_at --order desc --limit 20 \
            --json key,sizeInBytes,createdAt \
            | jq -r '.[] | "\(.key)\t\(.sizeInBytes)\t\(.createdAt[0:19])"' 2>/dev/null)
          TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE / 1048576" | bc)
          echo ""
          echo "**Total: ${TOTAL_MB} MB**"
