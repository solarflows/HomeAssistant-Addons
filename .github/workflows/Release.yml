name: Release Addon Images

on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON matrix of addons to build'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild all addons'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(inputs.matrix || '{"include":[]}') }}
      fail-fast: false
      max-parallel: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        id: prep
        run: |
          ADDON="${{ matrix.addon }}"
          ADDON_DIR="${{ matrix.addon_dir }}"
          VERSION="${{ matrix.version }}"
          TAG="${{ matrix.tag }}"
          IMAGE="${{ matrix.image }}"
          DOCKERFILE="${{ matrix.dockerfile }}"
          PLATFORMS="${{ matrix.platforms }}"
          REASON="${{ matrix.reason || 'version_changed' }}"

          echo "addon=$ADDON" >> $GITHUB_OUTPUT
          echo "addon_dir=$ADDON_DIR" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

      - name: Prepare build args
        id: buildargs
        run: |
          ADDON_DIR="${{ steps.prep.outputs.addon_dir }}"
          VERSION="${{ steps.prep.outputs.version }}"
          TAG="${{ steps.prep.outputs.tag }}"
          VERSION_FILE="${ADDON_DIR}/version.yaml"

          # 从 version.yaml 的 build_args 字段动态生成构建参数
          BUILD_ARGS=""
          if [ -f "$VERSION_FILE" ]; then
            BUILD_ARGS=$(yq eval '.build_args // {}' -o=json "$VERSION_FILE" | jq -r \
              --arg v "$VERSION" --arg t "$TAG" \
              'to_entries[] | "\(.key)=\(.value | gsub("\\$\\{version\\}"; $v) | gsub("\\$\\{tag\\}"; $t))"')

            # 应用 upstream_tag_transform（用于 Docker tag 格式转换）
            TRANSFORM=$(yq eval '.upstream_tag_transform // ""' "$VERSION_FILE")
            if [ -n "$TRANSFORM" ] && [ "$TRANSFORM" != "null" ]; then
              CURRENT_TAG=$(echo "$BUILD_ARGS" | grep -oP 'UPSTREAM_TAG=\K[^ ]+' || true)
              if [ -n "$CURRENT_TAG" ]; then
                NEW_TAG=$(echo "$CURRENT_TAG" | sed -E "$TRANSFORM")
                BUILD_ARGS=$(echo "$BUILD_ARGS" | sed "s/UPSTREAM_TAG=${CURRENT_TAG}/UPSTREAM_TAG=${NEW_TAG}/")
                echo "Applied tag transform: ${CURRENT_TAG} → ${NEW_TAG}"
              fi
            fi
          fi

          {
            echo "build_args<<BUILDARGS_EOF"
            echo "$BUILD_ARGS"
            echo "BUILDARGS_EOF"
          } >> $GITHUB_OUTPUT
          echo "Build args: $BUILD_ARGS"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.addon_dir }}
          file: ${{ steps.prep.outputs.dockerfile }}
          platforms: ${{ steps.prep.outputs.platforms }}
          push: true
          build-args: ${{ steps.buildargs.outputs.build_args }}
          tags: |
            ${{ steps.prep.outputs.image }}:latest
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare config updates & commit
        if: success()
        id: config
        run: |
          ADDON_DIR="${{ steps.prep.outputs.addon_dir }}"
          ADDON="${{ steps.prep.outputs.addon }}"
          VERSION="${{ steps.prep.outputs.version }}"
          TAG="${{ steps.prep.outputs.tag }}"
          REPO="${{ matrix.repo }}"
          REASON="${{ steps.prep.outputs.reason }}"
          CHANGELOG_SOURCE="${{ matrix.changelog_source }}"
          CHANGELOG_MODE="${{ matrix.changelog_mode }}"
          CHANGELOG_FILE_URL="${{ matrix.changelog_file_url }}"
          CHANGELOG_FILE_PATH="${{ matrix.changelog_file_path }}"
          COMMIT_MSG="${{ matrix.commit_msg }}"
          BASE_TAG="${{ matrix.base_tag }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d")

          # 更新 config.yaml 版本号（所有含版本号变更的 reason 都需要，以保证 HAOS 识别更新）
          if [ "$REASON" = "version_changed" ] || [ "$REASON" = "base_updated" ] || [ "$REASON" = "file_changed" ] || [ "$REASON" = "force_rebuild" ]; then
            yq eval ".version = \"${VERSION}\"" -i "${ADDON_DIR}/config.yaml"
            echo "Updated ${ADDON_DIR}/config.yaml to version ${VERSION}"
          fi

          # 更新 CHANGELOG.md
          if [ "$REASON" = "file_changed" ]; then
            # 文件变更：使用 commit message 作为 changelog
            CHANGELOG_CONTENT="${COMMIT_MSG:-chore: update workflow/Dockerfile}"
            if [ -f "${ADDON_DIR}/CHANGELOG.md" ]; then
              # prepend: 添加到开头
              printf "### %s - %s\n\n%s" "$TIMESTAMP" "$CHANGELOG_CONTENT" "$(cat "${ADDON_DIR}/CHANGELOG.md")" > temp_changelog.md
              mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
            else
              printf "### %s - %s\n\n" "$TIMESTAMP" "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
            fi
            echo "Updated ${ADDON_DIR}/CHANGELOG.md with file change record"
          elif [ "$REASON" = "base_updated" ]; then
            # 底包更新：记录 debian-base tag
            CHANGELOG_CONTENT="底包更新至 ${BASE_TAG}，无功能变更"
            if [ -f "${ADDON_DIR}/CHANGELOG.md" ]; then
              printf "### %s - %s\n\n%s" "$TIMESTAMP" "$CHANGELOG_CONTENT" "$(cat "${ADDON_DIR}/CHANGELOG.md")" > temp_changelog.md
              mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
            else
              printf "### %s - %s\n\n" "$TIMESTAMP" "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
            fi
            echo "Updated ${ADDON_DIR}/CHANGELOG.md with base image update record"
          elif [ "$REASON" = "version_changed" ]; then
            if [ "$CHANGELOG_SOURCE" = "tag_file" ] && [ -n "$CHANGELOG_FILE_PATH" ]; then
              # 从指定 tag 下的文件获取 changelog（使用 GitHub Contents API）
              CHANGELOG_CONTENT=$(curl -fsSL \
                -H "Accept: application/vnd.github.raw+json" \
                "https://api.github.com/repos/${REPO}/contents/${CHANGELOG_FILE_PATH}?ref=${TAG}" || echo "")
              if [ -n "$CHANGELOG_CONTENT" ]; then
                if [ "$CHANGELOG_MODE" = "replace" ]; then
                  echo "$CHANGELOG_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
                else
                  printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$CHANGELOG_CONTENT" > temp_changelog.md
                  cat temp_changelog.md "${ADDON_DIR}/CHANGELOG.md" > combined.md 2>/dev/null || mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
                  mv combined.md "${ADDON_DIR}/CHANGELOG.md" 2>/dev/null
                  rm -f temp_changelog.md combined.md
                fi
              fi
            elif [ "$CHANGELOG_SOURCE" = "file" ] && [ -n "$CHANGELOG_FILE_URL" ]; then
              FILE_CONTENT=$(curl -fsSL "$CHANGELOG_FILE_URL" || echo "")
              if [ -n "$FILE_CONTENT" ]; then
                if [ "$CHANGELOG_MODE" = "replace" ]; then
                  echo "$FILE_CONTENT" > "${ADDON_DIR}/CHANGELOG.md"
                else
                  printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$FILE_CONTENT" > temp_changelog.md
                  cat temp_changelog.md "${ADDON_DIR}/CHANGELOG.md" > combined.md 2>/dev/null || mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
                  mv combined.md "${ADDON_DIR}/CHANGELOG.md" 2>/dev/null
                  rm -f temp_changelog.md combined.md
                fi
              fi
            else
              # 默认: release_body - 从 GitHub release body 获取
              RELEASE_BODY=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" \
                | jq -r '.body // empty' | sed 's/\\r\\n/\n/g')
              [ -z "$RELEASE_BODY" ] && RELEASE_BODY="No changelog available."

              if [ "$CHANGELOG_MODE" = "replace" ]; then
                printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$RELEASE_BODY" > "${ADDON_DIR}/CHANGELOG.md"
              else
                # prepend: 新条目添加到开头
                printf "### %s (%s)\n%s\n\n" "$VERSION" "$TIMESTAMP" "$RELEASE_BODY" > temp_changelog.md
                cat temp_changelog.md "${ADDON_DIR}/CHANGELOG.md" > combined.md 2>/dev/null || mv temp_changelog.md "${ADDON_DIR}/CHANGELOG.md"
                mv combined.md "${ADDON_DIR}/CHANGELOG.md" 2>/dev/null
                rm -f temp_changelog.md combined.md
              fi
            fi
          fi

          # 独立提交：每个 addon 构建成功后立即 commit+push 自己的更新
          if git diff --quiet; then
            echo "No changes for ${ADDON}, skip commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${ADDON_DIR}/"
            if [ "$REASON" = "file_changed" ]; then
              git commit -m "chore(${ADDON}): ${COMMIT_MSG:-update workflow/Dockerfile}"
            elif [ "$REASON" = "base_updated" ]; then
              git commit -m "chore(${ADDON}): 底包更新至 ${BASE_TAG}，rebuild ${VERSION}"
            else
              git commit -m "chore(${ADDON}): update to ${VERSION}"
            fi
            # 重试 push，处理并行构建的竞态
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
            echo "Committed ${ADDON} ${VERSION}"
          fi
