name: Version Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HASS_TOKEN }}

      - name: Check debian-base updates
        id: base_check
        run: |
          # 获取 debian-base 最新 tag
          # 使用 GitHub API 查询 ghcr.io 包的最新版本
          REMOTE_TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/hassio-addons/addon-debian-base/releases/latest" \
            | jq -r '.tag_name // empty')

          [ -z "$REMOTE_TAG" ] && REMOTE_TAG="unknown"

          # 读取上次记录的 tag
          LOCAL_TAG_FILE=".github/.debian-base-tag"
          LOCAL_TAG="none"
          [ -f "$LOCAL_TAG_FILE" ] && LOCAL_TAG=$(cat "$LOCAL_TAG_FILE" | tr -d "'\n\r ")

          echo "debian-base local=$LOCAL_TAG remote=$REMOTE_TAG"

          if [ "$REMOTE_TAG" != "$LOCAL_TAG" ] && [ "$REMOTE_TAG" != "unknown" ]; then
            echo "debian_base_updated=true" >> $GITHUB_OUTPUT
            echo "remote_tag=$REMOTE_TAG" >> $GITHUB_OUTPUT
            # 保存新 tag
            mkdir -p .github
            echo "$REMOTE_TAG" > "$LOCAL_TAG_FILE"
          else
            echo "debian_base_updated=false" >> $GITHUB_OUTPUT
            echo "remote_tag=$LOCAL_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Detect version changes
        id: detect
        run: |
          MATRIX="[]"
          HAS_CHANGES="false"
          BASE_UPDATED="${{ steps.base_check.outputs.debian_base_updated }}"
          BASE_TAG="${{ steps.base_check.outputs.remote_tag }}"

          # 如果底包更新了，强制标记所有 addon 需要重建
          if [ "$BASE_UPDATED" = "true" ]; then
            echo "=== debian-base updated to $BASE_TAG, triggering all addon rebuilds ==="
            HAS_CHANGES="true"
          fi

          for version_file in */version.yaml; do
            [ -f "$version_file" ] || continue
            ADDON_DIR=$(dirname "$version_file")
            ADDON=$(yq eval '.addon' "$version_file")
            SOURCE=$(yq eval '.source' "$version_file")
            REPO=$(yq eval '.repo' "$version_file")
            TAG_PREFIX=$(yq eval '.tag_prefix // ""' "$version_file")

            # 读取本地版本
            LOCAL_VERSION=$(yq eval '.version' "${ADDON_DIR}/config.yaml" | tr -d "'\n\r ")
            [ -z "$LOCAL_VERSION" ] && continue

            echo "Checking $ADDON: local=$LOCAL_VERSION"

            # 获取远程版本
            if [ "$SOURCE" = "github_tags" ]; then
              REMOTE_TAG=$(curl -fsSL "https://api.github.com/repos/${REPO}/tags?per_page=1" \
                | jq -r '.[0].name // empty' | head -1)
            else
              REMOTE_TAG=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" \
                | jq -r '.tag_name // empty')
            fi

            [ -z "$REMOTE_TAG" ] && { echo "  Failed to get remote version, skipping"; continue; }

            # 去除 tag 前缀
            REMOTE_VERSION="$REMOTE_TAG"
            if [ -n "$TAG_PREFIX" ] && [ "$TAG_PREFIX" != "null" ]; then
              REMOTE_VERSION=$(echo "$REMOTE_VERSION" | sed "s/^${TAG_PREFIX}//")
            fi

            echo "  Remote: $REMOTE_VERSION"

            # 判断是否需要加入矩阵：版本变化 或 底包更新
            NEED_BUILD="false"
            REASON=""
            if [ "$REMOTE_VERSION" != "$LOCAL_VERSION" ]; then
              NEED_BUILD="true"
              REASON="version_changed"
              echo "  New version detected!"
            elif [ "$BASE_UPDATED" = "true" ]; then
              NEED_BUILD="true"
              REASON="base_updated"
              echo "  Rebuild due to debian-base update"
            fi

            if [ "$NEED_BUILD" = "true" ]; then
              HAS_CHANGES="true"

              DOCKERFILE="${ADDON_DIR}/Dockerfile"
              [ ! -f "$DOCKERFILE" ] && { echo "  Warning: Dockerfile not found"; continue; }

              IMAGE=$(yq eval '.image // ""' "${ADDON_DIR}/config.yaml")
              [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ] && IMAGE="ghcr.io/${{ github.repository_owner }}/${ADDON}"

              ARCHS=$(yq eval '.arch | join(",")' "${ADDON_DIR}/config.yaml")
              [ -z "$ARCHS" ] || [ "$ARCHS" = "null" ] && ARCHS="aarch64,amd64"
              PLATFORMS=$(echo "$ARCHS" | sed 's/aarch64/arm64/g; s/amd64/amd64/g; s/armhf/arm\/v7/g; s/armv7/arm\/v7/g; s/i386/386/g' | sed 's/\([^,]*\)/linux\/\1/g')

              CHANGELOG_SOURCE=$(yq eval '.changelog.source // "release_body"' "$version_file")
              CHANGELOG_MODE=$(yq eval '.changelog.mode // "prepend"' "$version_file")
              CHANGELOG_FILE_URL=$(yq eval '.changelog.file_url // ""' "$version_file")

              # 底包更新时版本号不变
              FINAL_VERSION="$REMOTE_VERSION"
              FINAL_TAG="$REMOTE_TAG"
              if [ "$REASON" = "base_updated" ]; then
                FINAL_VERSION="$LOCAL_VERSION"
                FINAL_TAG="${TAG_PREFIX}${LOCAL_VERSION}"
              fi

              MATRIX=$(echo "$MATRIX" | jq -c \
                --arg addon "$ADDON" \
                --arg addon_dir "$ADDON_DIR" \
                --arg version "$FINAL_VERSION" \
                --arg tag "$FINAL_TAG" \
                --arg image "$IMAGE" \
                --arg dockerfile "$DOCKERFILE" \
                --arg platforms "$PLATFORMS" \
                --arg repo "$REPO" \
                --arg changelog_source "$CHANGELOG_SOURCE" \
                --arg changelog_mode "$CHANGELOG_MODE" \
                --arg changelog_file_url "$CHANGELOG_FILE_URL" \
                --arg reason "$REASON" \
                --arg base_tag "$BASE_TAG" \
                '. + [{
                  addon: $addon, addon_dir: $addon_dir,
                  version: $version, tag: $tag,
                  image: $image, dockerfile: $dockerfile,
                  platforms: $platforms, repo: $repo,
                  changelog_source: $changelog_source,
                  changelog_mode: $changelog_mode,
                  changelog_file_url: $changelog_file_url,
                  reason: $reason, base_tag: $base_tag
                }]')
            else
              echo "  Version unchanged"
            fi
          done

          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "=== Matrix ==="
          echo "$MATRIX" | jq .

      - name: Trigger Release
        if: steps.detect.outputs.has_changes == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Release.yml
          inputs: '{"matrix": "${{ steps.detect.outputs.matrix }}"}'
          token: ${{ secrets.HASS_TOKEN }}

