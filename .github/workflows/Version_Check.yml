name: Version Check

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all addons (ignore version check)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  push:
    branches:
      - main
    paths:
      - '**/Dockerfile'
      - '**/rootfs/**'
      - '.github/workflows/**'

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version changes
        id: detect
        run: |
          MATRIX="[]"
          HAS_CHANGES="false"

          # ============================================================
          # 1. 获取 debian-base 最新 tag
          # ============================================================
          REMOTE_BASE_TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/hassio-addons/addon-debian-base/releases/latest" \
            | jq -r '.tag_name // empty')
          [ -z "$REMOTE_BASE_TAG" ] && REMOTE_BASE_TAG="unknown"
          echo "debian-base remote: $REMOTE_BASE_TAG"

          FORCE_REBUILD="${{ inputs.force_rebuild || 'false' }}"
          if [ "$FORCE_REBUILD" = "true" ]; then
            echo "=== Force rebuild enabled ==="
          fi

          # ============================================================
          # 2. 检测文件变更（push / cron / dispatch）
          # ============================================================
          CHANGED_FILES=""
          COMMIT_MSG=""

          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            echo "=== Push event: diff ${{ github.event.before }}..${{ github.event.after }} ==="
          else
            # 从任意一个 addon 的 tracking.file_sha 取上次检查点
            LAST_SHA=""
            for vf in */version.yaml; do
              [ -f "$vf" ] || continue
              LAST_SHA=$(yq eval '.tracking.file_sha // ""' "$vf")
              [ -n "$LAST_SHA" ] && break
            done
            if [ -n "$LAST_SHA" ]; then
              CHANGED_FILES=$(git diff --name-only "$LAST_SHA" HEAD 2>/dev/null || echo "")
              echo "=== Cron/dispatch: diff $LAST_SHA..HEAD ==="
            else
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
              echo "=== First run: diff HEAD~1..HEAD ==="
            fi
            COMMIT_MSG=$(git log -1 --pretty=format:"%s" 2>/dev/null || echo "")
          fi

          # ============================================================
          # 3. 遍历 addon，检测上游版本和底包变更
          # ============================================================
          declare -A ADDON_MATRIX
          declare -A ADDON_REASON
          declare -A ADDON_REMOTE_VERSION

          for version_file in */version.yaml; do
            [ -f "$version_file" ] || continue
            ADDON_DIR=$(dirname "$version_file")
            ADDON=$(yq eval '.addon' "$version_file")
            SOURCE=$(yq eval '.source' "$version_file")
            REPO=$(yq eval '.repo' "$version_file")
            TAG_PREFIX=$(yq eval '.tag_prefix // ""' "$version_file")

            LOCAL_VERSION=$(yq eval '.tracking.upstream_version // ""' "$version_file")
            [ -z "$LOCAL_VERSION" ] && continue

            echo "Checking $ADDON: local=$LOCAL_VERSION"

            # --- 获取远程版本 ---
            if [ "$SOURCE" = "github_tags" ]; then
              REMOTE_TAG=$(curl -fsSL "https://api.github.com/repos/${REPO}/tags?per_page=1" \
                | jq -r '.[0].name // empty' | head -1)
            else
              REMOTE_TAG=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" \
                | jq -r '.tag_name // empty')
            fi
            [ -z "$REMOTE_TAG" ] && { echo "  Failed to get remote version, skipping"; continue; }

            REMOTE_VERSION="$REMOTE_TAG"
            if [ -n "$TAG_PREFIX" ] && [ "$TAG_PREFIX" != "null" ]; then
              REMOTE_VERSION=$(echo "$REMOTE_VERSION" | sed "s/^${TAG_PREFIX}//")
            fi
            echo "  Remote: $REMOTE_VERSION"

            # --- 判断 reason ---
            REASON=""
            if [ "$FORCE_REBUILD" = "true" ]; then
              REASON="force_rebuild"
              echo "  Force rebuild"
            elif [ "$REMOTE_VERSION" != "$LOCAL_VERSION" ]; then
              REASON="version_changed"
              echo "  New version detected!"
            else
              # 检查底包更新（仅 debian-base 系 addon）
              ADDON_BASE_TAG=$(yq eval '.tracking.base_tag // ""' "$version_file")
              if [ -n "$ADDON_BASE_TAG" ] && [ "$ADDON_BASE_TAG" != "$REMOTE_BASE_TAG" ] && [ "$REMOTE_BASE_TAG" != "unknown" ]; then
                REASON="base_updated"
                echo "  Base image: $ADDON_BASE_TAG → $REMOTE_BASE_TAG"
              fi
            fi

            if [ -n "$REASON" ]; then
              HAS_CHANGES="true"
              ADDON_MATRIX["$ADDON_DIR"]="$ADDON"
              ADDON_REASON["$ADDON_DIR"]="$REASON"
              ADDON_REMOTE_VERSION["$ADDON_DIR"]="$REMOTE_VERSION"
            else
              echo "  Version unchanged"
            fi
          done

          # ============================================================
          # 4. 匹配文件变更到 addon
          # ============================================================
          if [ -n "$CHANGED_FILES" ]; then
            echo "=== File changes ==="
            echo "$CHANGED_FILES"

            for file in $CHANGED_FILES; do
              if echo "$file" | grep -qE '^(.github/workflows/|[^/]+/Dockerfile|[^/]+/rootfs/)'; then
                ADDON_DIR=$(echo "$file" | cut -d'/' -f1)
                if [ -f "${ADDON_DIR}/version.yaml" ]; then
                  if [ -z "${ADDON_MATRIX[$ADDON_DIR]}" ]; then
                    echo "  File change: $file → addon $ADDON_DIR"
                    HAS_CHANGES="true"
                    ADDON_MATRIX["$ADDON_DIR"]="$(yq eval '.addon' "${ADDON_DIR}/version.yaml")"
                    ADDON_REASON["$ADDON_DIR"]="file_changed"
                  fi
                fi
              fi
            done
          fi

          # ============================================================
          # 5. 构建 matrix
          # ============================================================
          for ADDON_DIR in "${!ADDON_MATRIX[@]}"; do
            ADDON="${ADDON_MATRIX[$ADDON_DIR]}"
            REASON="${ADDON_REASON[$ADDON_DIR]}"
            version_file="${ADDON_DIR}/version.yaml"

            VERSION=$(yq eval '.tracking.upstream_version // ""' "$version_file")
            REMOTE_VERSION="${ADDON_REMOTE_VERSION[$ADDON_DIR]}"

            # 版本号：version 始终为清洁版本（用于 build_args 拉取上游源码）
            # build_version 带 -build.N 后缀（用于 config.yaml + Docker tag + HAOS 识别）
            BUILD_VERSION="$VERSION"
            NEW_BUILD_NUM=0
            if [ "$REASON" = "version_changed" ]; then
              VERSION="$REMOTE_VERSION"
              BUILD_VERSION="$REMOTE_VERSION"
              NEW_BUILD_NUM=0
            elif [ "$REASON" = "base_updated" ] || [ "$REASON" = "file_changed" ] || [ "$REASON" = "force_rebuild" ]; then
              BUILD_NUM=$(yq eval '.tracking.build_num // 0' "$version_file")
              NEW_BUILD_NUM=$((BUILD_NUM + 1))
              BUILD_VERSION="${VERSION}-build.${NEW_BUILD_NUM}"
              echo "  Build suffix: ${BUILD_VERSION}"
            fi

            MATRIX=$(echo "$MATRIX" | jq -c \
              --arg addon "$ADDON" \
              --arg version "$VERSION" \
              --arg build_version "$BUILD_VERSION" \
              --arg reason "$REASON" \
              --arg base_tag "$REMOTE_BASE_TAG" \
              --argjson build_num "$NEW_BUILD_NUM" \
              '. + [{addon: $addon, version: $version, build_version: $build_version, reason: $reason, base_tag: $base_tag, build_num: $build_num}]')
          done

          RESULT=$(echo "$MATRIX" | jq -c '{include: .}')
          echo "matrix=$RESULT" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "=== Matrix ==="
          echo "$RESULT" | jq .

  trigger-release:
    needs: check-versions
    if: needs.check-versions.outputs.has_changes == 'true'
    uses: ./.github/workflows/Release.yml
    with:
      matrix: ${{ needs.check-versions.outputs.matrix }}
      force_rebuild: ${{ inputs.force_rebuild || false }}
    secrets: inherit

